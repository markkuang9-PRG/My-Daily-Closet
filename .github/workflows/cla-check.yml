name: CLA Check

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate CLA checkbox
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const requiredChecks = [
              /\-\s*\[[xX]\]\s*I have the right to submit this contribution\./,
              /\-\s*\[[xX]\]\s*I agree to the Contributor License Agreement/,
              /\-\s*\[[xX]\]\s*If my employer, client, or school could claim rights in this contribution, I have the needed approval or waiver\./,
              /\-\s*\[[xX]\]\s*I understand this repository is publicly released under AGPL-3\.0/
            ];

            const missing = requiredChecks.filter((pattern) => !pattern.test(body));

            if (missing.length > 0) {
              core.setFailed("CLA checklist is incomplete. Please check every CLA item in the pull request template before review.");
            }

      - name: Comment guidance on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = [
              "This pull request is missing the required CLA confirmations.",
              "",
              "Before review, please update the PR description and check every item in the CLA checklist.",
              "",
              "References:",
              "- `CLA.md`",
              "- `CONTRIBUTING.md`",
              "- `TRADEMARKS.md`"
            ].join("\n");

            await github.rest.issues.createComment({ owner, repo, issue_number, body });
