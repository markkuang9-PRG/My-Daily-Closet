name: Bug report
description: Report a reproducible problem in My Daily Closet.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please do not attach confidential material, private customer data, or proprietary assets unless the project owner has separately agreed in writing to receive them.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, and app version if known.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, logs, or anything else helpful.
    validations:
      required: false
