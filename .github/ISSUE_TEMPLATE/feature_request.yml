name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        If you later submit implementation work, contributions are governed by `CLA.md`, and names / logos remain subject to `TRADEMARKS.md`.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user or product problem first.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature, workflow, or technical approach.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Share other approaches you considered.
    validations:
      required: false
